name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: llm-mock-linux-amd64
          - target: x86_64-pc-windows-gnu
            os: ubuntu-latest
            artifact_name: llm-mock-windows-amd64.exe
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact_name: llm-mock-macos-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_name: llm-mock-macos-arm64

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.target }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux)
        if: matrix.target == 'x86_64-pc-windows-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-mingw-w64

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary (Linux/Mac)
        if: matrix.target != 'x86_64-pc-windows-gnu'
        run: mv target/${{ matrix.target }}/release/llm-mock ${{ matrix.artifact_name }}

      - name: Rename binary (Windows)
        if: matrix.target == 'x86_64-pc-windows-gnu'
        run: mv target/${{ matrix.target }}/release/llm-mock.exe ${{ matrix.artifact_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/llm-mock-linux-amd64/llm-mock-linux-amd64
            artifacts/llm-mock-windows-amd64.exe/llm-mock-windows-amd64.exe
            artifacts/llm-mock-macos-amd64/llm-mock-macos-amd64
            artifacts/llm-mock-macos-arm64/llm-mock-macos-arm64
          generate_release_notes: true
